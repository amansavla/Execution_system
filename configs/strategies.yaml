# strategies.yaml — Strategy configuration templates
# Each strategy is identified by a unique strategy_id.
# An empty list is valid — it means no strategies are configured yet.

strategies:
  - strategy_id: "xsp_0dte_1000"
    enabled: true
    description: "XSP 0DTE breakout at 10:00 AM, 0.2% trigger, 30% SL"
    underlying: "XSP"
    option_type: "single"
    direction: "long"
    dte_target: 0
    entry:
      signal_source: "xsp_breakout"
      max_contracts: 20          # safety cap; actual qty sized dynamically
      limit_price_offset: 0.05
      order_timeout_seconds: 90
    exit:
      stop_loss_pct: 30
      time_exit_utc: "15:20"
      use_mid_for_exits: false
    position_sizing_pct: 0.01    # 1% of NetLiq per trade (matches backtest)

